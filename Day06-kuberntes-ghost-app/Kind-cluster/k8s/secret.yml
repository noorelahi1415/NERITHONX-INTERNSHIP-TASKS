# NOTE: This file has real-looking secret values in plaintext for convenience.
# Do NOT commit this file to Git. Add it to .gitignore, or better, generate it
# imperatively instead of applying this file directly:
#
#   kubectl create secret generic ghost-secret -n ghost-app \
#     --from-literal=MYSQL_PASSWORD='ghostpwd' \
#     --from-literal=MYSQL_ROOT_PASSWORD='root' \
#     --from-literal=database__connection__password='ghostpwd' \
#     --from-literal=mail__options__auth__pass='REPLACE_WITH_NEW_APP_PASSWORD'
#
apiVersion: v1
kind: Secret
metadata:
  name: ghost-secret
  namespace: ghost-app
type: Opaque
stringData:
  MYSQL_PASSWORD: "ghostpwd"
  MYSQL_ROOT_PASSWORD: "root"
  database__connection__password: "ghostpwd"
  mail__options__auth__pass: "thcyaxdxdomlhzea"
