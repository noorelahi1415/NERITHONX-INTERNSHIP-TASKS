apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost-app
  namespace: ghost-app
  labels:
    app: ghost-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghost-app
  template:
    metadata:
      labels:
        app: ghost-app
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ghost-mysql 3306; do
                echo "waiting for mysql..."
                sleep 3
              done
      containers:
        - name: ghost
          image: docker pull ghcr.io/noorelahi1415/ghost-custom:48c65217c37e7fe2af0796facf67b4476e975a52
          ports:
            - containerPort: 2368
              name: http
          envFrom:
            - configMapRef:
                name: ghost-config
            - secretRef:
                name: ghost-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 2368
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 2368
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
      # If ghcr.io/noorelahi1415/ghost-custom is a PRIVATE package, uncomment below
      # and create the secret first:
      #   kubectl create secret docker-registry ghcr-creds -n ghost-app \
      #     --docker-server=ghcr.io --docker-username=<gh-username> \
      #     --docker-password=<gh-PAT-with-read:packages>
      # imagePullSecrets:
      #   - name: ghcr-creds
