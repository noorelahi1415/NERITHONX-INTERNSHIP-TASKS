name: Build and Push Ghost Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile:  Day05-GitHub-Actions-Custom-Ghost-CI/Dockerfile
          failure-threshold: warning

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: Day05-GitHub-Actions-Custom-Ghost-CI
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ghost-custom:latest
            ghcr.io/${{ github.repository_owner }}/ghost-custom:${{ github.sha }}