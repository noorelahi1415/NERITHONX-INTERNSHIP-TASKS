name: Deploy Ghost to Kind Cluster

on:
  workflow_run:
    workflows: ["Build and Push Ghost Image"]
    types:
      - completed

concurrency:
  group: deploy-ghost-production
  cancel-in-progress: false

env:
  NAMESPACE: ghost-app
  K8S_DIR: Day06-kuberntes-ghost-app/Kind-cluster/k8s
  IMAGE: ghcr.io/${{ github.repository_owner }}/ghost-custom
  KUBECONFIG: /home/noor-elahi/.kube/config

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Apply namespace first
        run: kubectl apply -f ${{ env.K8S_DIR }}/namespace.yml

      - name: Apply secrets and config
        run: |
          kubectl apply -f ${{ env.K8S_DIR }}/secret.yml
          kubectl apply -f ${{ env.K8S_DIR }}/configmap.yml

      - name: Apply MySQL layer
        run: |
          kubectl apply -f ${{ env.K8S_DIR }}/mysql-pvc.yml
          kubectl apply -f ${{ env.K8S_DIR }}/mysql-deployment.yml
          kubectl apply -f ${{ env.K8S_DIR }}/mysql-service.yml

      - name: Wait for MySQL to be ready
        run: kubectl rollout status deployment/ghost-mysql -n ${{ env.NAMESPACE }} --timeout=200s

      - name: Apply Ghost layer
        run: |
          kubectl apply -f ${{ env.K8S_DIR }}/ghost-deployment.yml
          kubectl apply -f ${{ env.K8S_DIR }}/ghost-service.yml
          kubectl apply -f ${{ env.K8S_DIR }}/ghost-ingress.yml

      - name: Deploy exact image built by CI (immutable SHA tag)
        run: |
          kubectl set image deployment/ghost-app \
           ghost=${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }} \
           -n ${{ env.NAMESPACE }}

      - name: Wait for Ghost rollout to complete
        id: rollout
        run: kubectl rollout status deployment/ghost-app -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Verify pods are healthy
        run: kubectl get pods -n ${{ env.NAMESPACE }} -o wide

      - name: Verify Ghost service
        run: |
          kubectl get svc -n ${{ env.NAMESPACE }}
      - name: Verify Ghost is Running
        run: |
           kubectl rollout status deployment/ghost-app -n ${{ env.NAMESPACE }}
      - name: Roll back automatically if deployment failed
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "Deployment failed — rolling back to previous version"
          kubectl rollout undo deployment/ghost-app -n ${{ env.NAMESPACE }}